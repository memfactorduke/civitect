# Weekly verification that is too slow/hardware-bound for per-PR CI (TDD §12.4/§12.6).
name: Weekly

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  # TDD §12.6 / ADR-005: golden replays in Chromium + WebKit must reproduce
  # the committed Node hashes (which the per-PR golden gate verifies) —
  # catches engine float/JIT surprises. LIVE since board PR 12.
  determinism-cross-check:
    name: Determinism cross-check (Node/Chromium/WebKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Golden gate (the Node anchor for the committed hashes)
        run: pnpm gate:golden
      - name: Install Playwright browsers (Chromium + WebKit)
        run: pnpm --filter @civitect/e2e exec playwright install --with-deps chromium webkit
      - name: Cross-check (browsers must reproduce the committed hashes)
        run: pnpm e2e:cross-check

  device-perf-traces:
    name: Device perf traces (STUB — ROADMAP Phase 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/ci/device-perf-traces.mjs
