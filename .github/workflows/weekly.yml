# Weekly verification that is too slow/hardware-bound for per-PR CI (TDD §12.4/§12.6).
name: Weekly

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  # TDD §12.6 / ADR-005: golden replays in Chromium + WebKit must reproduce
  # the committed Node hashes (which the per-PR golden gate verifies) —
  # catches engine float/JIT surprises. LIVE since board PR 12.
  determinism-cross-check:
    name: Determinism cross-check (Node/Chromium/WebKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Golden gate (the Node anchor for the committed hashes)
        run: pnpm gate:golden
      - name: Install Playwright browsers (Chromium + WebKit)
        run: pnpm --filter @civitect/e2e exec playwright install --with-deps chromium webkit
      - name: Cross-check (browsers must reproduce the committed hashes)
        run: pnpm e2e:cross-check

  # The Phase 5 exit criterion (board task 6, GDD §17): the five archetypes
  # held inside their balance bands across the FULL 20-game-year horizon —
  # structurally a weekly/dispatchable run (~2.5–3 h wall, ADR-013 §3's
  # CI-budget note), not per-PR. The per-PR CI runs the same harness at 2 years.
  archetype-exit-criteria:
    name: Archetype bands — 20 game-years (Phase 5 exit criterion)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 5 archetypes × 20 game-years inside bands
        run: pnpm gate:archetypes
        env:
          GAME_YEARS: "20"

  device-perf-traces:
    name: Device perf traces (Chromium render budget)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browser (Chromium)
        run: pnpm --filter @civitect/e2e exec playwright install --with-deps chromium
      - name: Chromium render-frame budget
        run: node scripts/ci/device-perf-traces.mjs
