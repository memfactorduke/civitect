# Weekly verification that is too slow/hardware-bound for per-PR CI (TDD §12.4/§12.6).
name: Weekly

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  determinism-cross-check:
    name: Determinism cross-check (STUB — ROADMAP Phase 0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/ci/determinism-cross-check.mjs

  device-perf-traces:
    name: Device perf traces (STUB — ROADMAP Phase 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/ci/device-perf-traces.mjs
