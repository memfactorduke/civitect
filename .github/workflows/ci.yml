# ADR-013 gate ladder, in its binding order: lint → typecheck → unit → golden-masters → perf.
# (ADR-007: GitHub Actions, trunk-based; AI-WORKFLOW: CI is the arbiter of done.)
#
# Gate status (each remaining stub references the roadmap phase that makes it real):
#   lint / wall / typecheck / unit ... LIVE
#   golden-masters ................... LIVE (e2e golden corpus, board PR 4)
#   balance simulations .............. STUB (ROADMAP Phase 2)
#   perf gate ........................ LIVE (tick p95 vs TDD §2 hard gate, board PR 4)
#   asset gates ...................... STUB (ROADMAP Phase 0 — board PR 11)
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    name: ADR-013 gate ladder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      # ADR-007 keeps ESLint scoped to packages/sim, solely for the ADR-005 ban-rules.
      - name: Determinism lint (ESLint, packages/sim)
        run: pnpm lint:determinism

      - name: Import wall (dependency-cruiser, ADR-006)
        run: pnpm wall

      - name: Typecheck (tsc -b, strict)
        run: pnpm typecheck

      - name: Unit (Vitest, Node-mode)
        run: pnpm test

      - name: Golden-master cities (TDD §12.1)
        run: pnpm gate:golden

      - name: Balance simulations (ADR-013 §3 bands)
        run: pnpm gate:balance

      # Per-PR archetype bands at 2 game-years (board phase-5 task 6). The full
      # 5×20-game-year exit criterion is the weekly/dispatchable run
      # (.github/workflows/weekly.yml, GAME_YEARS=20). [TUNE: split into
      # parallel vitest files to cut the sequential ~9-min wall.]
      - name: Archetype balance harness (ADR-013 §3, 2-year bands)
        run: pnpm gate:archetypes
        env:
          GAME_YEARS: "2"

      - name: Perf gate (TDD §2 / §12.4)
        run: pnpm gate:perf

      - name: Asset gates (ADR-012 sprite intake)
        run: pnpm gate:assets

      # TDD §12.5 boot smoke: tap→command→sim→snapshot→highlight in a real
      # browser, asserting the TDD §2 input→visual HARD gate (100 ms).
      # The 50 ms target is verified on real hardware (SMOKE_BUDGET_MS=50).
      - name: Install Playwright Chromium
        run: pnpm --filter @civitect/e2e exec playwright install --with-deps chromium

      - name: E2E smoke (Playwright)
        run: pnpm e2e:smoke
