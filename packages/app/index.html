<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Civitect</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #11181a;
        overflow: hidden;
      }
      #world {
        position: absolute;
        inset: 0;
      }
      #overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        color: #e8efe9;
        font-family: system-ui, sans-serif;
      }
      /* Panels re-enable hit-testing; the world stays tappable between
         them — so panels must hug their content, never span the canvas
         (a full-width section silently ate the road tool's drags; the
         drag e2e caught it). */
      #overlay > * {
        pointer-events: auto;
        width: max-content;
        max-width: 320px;
      }
    </style>
  </head>
  <body>
    <div id="world"></div>
    <div id="overlay"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
