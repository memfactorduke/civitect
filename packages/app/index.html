<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Civitect</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #11181a;
        overflow: hidden;
      }
      #world {
        position: absolute;
        inset: 0;
      }
      #overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        color: #e8efe9;
        font-family: system-ui, sans-serif;
      }
      /* Panels re-enable hit-testing; the world stays tappable between
         them — so panels must hug their content, never span the canvas
         (a full-width section silently ate the road tool's drags; the
         drag e2e caught it). */
      #overlay > * {
        pointer-events: auto;
        width: max-content;
        max-width: 320px;
      }
      #build-preview {
        position: absolute;
        left: 16px;
        bottom: 16px;
        z-index: 2;
        max-width: min(360px, calc(100vw - 32px));
        border: 1px solid rgba(232, 239, 233, 0.24);
        border-radius: 8px;
        background: rgba(17, 24, 26, 0.88);
        color: #e8efe9;
        font: 600 13px/1.35 system-ui, sans-serif;
        padding: 8px 10px;
        pointer-events: none;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
      }
      #build-preview[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="world"></div>
    <div id="overlay"></div>
    <div id="build-preview" role="status" aria-live="polite" hidden></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
